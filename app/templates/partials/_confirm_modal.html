        <div x-show="confirmacao.show" class="fixed inset-0 z-[70] flex items-start sm:items-center justify-center p-2 sm:p-4 py-6 sm:py-8 overflow-y-auto" style="display: none;">
            <div @click="cancelarConfirmacao" class="fixed inset-0 bg-slate-950/80"></div>

            <div
                x-show="confirmacao.show"
                x-transition:enter="transition ease-out duration-200"
                x-transition:enter-start="opacity-0 scale-95"
                x-transition:enter-end="opacity-100 scale-100"
                class="bg-slate-900 rounded-2xl shadow-2xl border border-slate-800 w-full max-w-sm max-h-[calc(100vh-3rem)] overflow-y-auto relative z-10 p-5 sm:p-6"
            >
                <div class="flex items-center gap-3 mb-3">
                    <span class="p-2.5 rounded-xl" :class="confirmacao.perigo ? 'text-rose-400 bg-rose-500/10' : 'text-amber-400 bg-amber-500/10'">
                        <i class="fa-solid fa-triangle-exclamation animate-pulse"></i>
                    </span>
                    <h2 class="text-base font-bold text-slate-100" x-text="confirmacao.titulo"></h2>
                </div>
                <p class="text-sm text-slate-400 mb-6" x-text="confirmacao.mensagem"></p>
                <div class="flex gap-3 justify-end">
                    <button
                        type="button"
                        @click="cancelarConfirmacao"
                        :disabled="confirmandoAcao"
                        class="bg-slate-800 hover:bg-slate-700 disabled:opacity-40 disabled:cursor-not-allowed text-slate-300 font-semibold px-5 py-2.5 rounded-xl transition-fast"
                    >
                        Cancelar
                    </button>
                    <button
                        type="button"
                        @click="confirmarAcao"
                        :disabled="confirmandoAcao"
                        class="text-white font-semibold px-5 py-2.5 rounded-xl transition-fast disabled:opacity-60 disabled:cursor-not-allowed flex items-center gap-2"
                        :class="confirmacao.perigo ? 'bg-rose-600 hover:bg-rose-500' : 'bg-indigo-600 hover:bg-indigo-500'"
                    >
                        <i x-show="confirmandoAcao" class="fa-solid fa-circle-notch fa-spin"></i>
                        <span x-text="confirmandoAcao ? 'Aguarde...' : confirmacao.textoConfirmar"></span>
                    </button>
                </div>
            </div>
        </div>
