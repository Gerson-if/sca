        <div
            x-show="toast.show"
            x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0 translate-y-3"
            x-transition:enter-end="opacity-100 translate-y-0"
            x-transition:leave="transition ease-in duration-200"
            x-transition:leave-start="opacity-100 translate-y-0"
            x-transition:leave-end="opacity-0 translate-y-3"
            class="fixed bottom-5 right-5 z-[60] max-w-sm w-[calc(100%-2.5rem)] sm:w-auto"
            style="display: none;"
        >
            <div class="flex items-start gap-3 rounded-2xl shadow-2xl border px-4 py-3.5"
                :class="{
                    'bg-slate-900 border-emerald-500/30': toast.tipo === 'sucesso',
                    'bg-slate-900 border-amber-500/30': toast.tipo === 'aviso',
                    'bg-slate-900 border-rose-500/30': toast.tipo === 'erro'
                }"
            >
                <i class="fa-solid text-lg mt-0.5 animate-bounce"
                   :class="{
                        [toast.icone]: true,
                        'text-emerald-400': toast.tipo === 'sucesso',
                        'text-amber-400': toast.tipo === 'aviso',
                        'text-rose-400': toast.tipo === 'erro'
                   }"
                ></i>
                <p class="text-sm font-semibold text-slate-100 flex-1" x-text="toast.mensagem"></p>
                <button @click="toast.show = false" class="text-slate-500 hover:text-slate-300 transition-fast">
                    <i class="fa-solid fa-xmark text-sm"></i>
                </button>
            </div>
        </div>
