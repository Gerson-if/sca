                <div x-show="detalheCidadeAberto" class="fixed inset-0 z-50 flex items-center justify-center p-4 overflow-y-auto" style="display: none;">
                    <div @click="fecharDetalheCidade" class="fixed inset-0 bg-slate-950/80"></div>

                    <template x-if="cidadeDetalhe">
                        <div class="bg-slate-900 rounded-2xl shadow-2xl border border-slate-800 w-full max-w-xl overflow-hidden relative z-10">
                            <div class="relative h-40 bg-slate-800">
                                <img x-show="cidadeDetalhe.imagemUrl" :src="cidadeDetalhe.imagemUrl" class="w-full h-full object-cover" />
                                <div x-show="!cidadeDetalhe.imagemUrl" class="w-full h-full flex items-center justify-center text-slate-700">
                                    <i class="fa-solid fa-city text-5xl"></i>
                                </div>
                                <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-slate-900/40 to-transparent"></div>
                                <button @click="fecharDetalheCidade" class="absolute top-3 right-3 bg-slate-950/70 hover:bg-slate-950 text-slate-300 hover:text-white w-8 h-8 rounded-full flex items-center justify-center transition-fast">
                                    <i class="fa-solid fa-xmark"></i>
                                </button>
                                <div class="absolute bottom-3 left-4 right-4 flex items-end justify-between gap-2">
                                    <h2 class="text-2xl font-extrabold text-white tracking-tight" x-text="cidadeDetalhe.nome"></h2>
                                    <span class="px-2.5 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider mb-1"
                                        :class="cidadeDetalhe.perfil === 'matriz' ? 'bg-blue-500/90 text-white' : 'bg-slate-700/90 text-slate-100'"
                                        x-text="cidadeDetalhe.perfil === 'matriz' ? rotulosCards.matriz : rotulosCards.filial"></span>
                                </div>
                            </div>

                            <div class="p-6 space-y-4 max-h-[65vh] overflow-y-auto">
                                <template x-for="campo in estiloCards.campos" :key="'campo-' + campo">
                                    <div>
                                        <!-- CLIMA -->
                                        <template x-if="campo === 'clima'">
                                            <div x-show="climaPorCidade[cidadeDetalhe.id] && climaPorCidade[cidadeDetalhe.id].disponivel"
                                                 class="flex items-center gap-3 bg-slate-950 border border-slate-800 rounded-xl p-3">
                                                <i class="fa-solid text-2xl text-indigo-400" :class="climaPorCidade[cidadeDetalhe.id] ? climaPorCidade[cidadeDetalhe.id].icone : 'fa-cloud'"></i>
                                                <div>
                                                    <p class="text-sm font-bold text-slate-100">
                                                        <span x-text="climaPorCidade[cidadeDetalhe.id] ? Math.round(climaPorCidade[cidadeDetalhe.id].temperatura) + '°C' : ''"></span>
                                                        —
                                                        <span x-text="climaPorCidade[cidadeDetalhe.id] ? climaPorCidade[cidadeDetalhe.id].descricao : ''"></span>
                                                    </p>
                                                    <p class="text-[11px] text-slate-500">Clima atual da região</p>
                                                </div>
                                            </div>
                                        </template>

                                        <!-- PRAZO OPERACIONAL -->
                                        <template x-if="campo === 'prazo'">
                                            <div class="space-y-2">
                                                <div class="flex flex-col gap-1">
                                                    <span class="text-slate-500 text-xs" x-text="rotulosCards.prazo + ':'"></span>
                                                    <template x-if="cidadeDetalhe.modoPrazo !== 'semData'">
                                                        <span class="font-bold text-slate-100 bg-slate-800 px-2 py-1.5 rounded-lg text-xs w-max flex items-center gap-1.5">
                                                            <i class="fa-regular fa-calendar-check text-indigo-400"></i>
                                                            <span x-text="formatarData(cidadeDetalhe.prazoInicio, cidadeDetalhe.modoPrazo === 'dataHora') + ' até ' + formatarData(cidadeDetalhe.prazoFim, cidadeDetalhe.modoPrazo === 'dataHora')"></span>
                                                        </span>
                                                    </template>
                                                    <template x-if="cidadeDetalhe.modoPrazo === 'semData'">
                                                        <span class="text-slate-400 font-semibold italic flex items-center gap-1.5">
                                                            <i class="fa-solid fa-infinity text-emerald-400 animate-pulse"></i> <span x-text="rotulosCards.semPrazo"></span>
                                                        </span>
                                                    </template>
                                                </div>

                                                <template x-if="cidadeDetalhe.modoPrazo !== 'semData'">
                                                    <div class="space-y-1.5 pt-1">
                                                        <div class="flex justify-between text-xs">
                                                            <span class="text-amber-400 font-bold flex items-center gap-1"><i class="fa-solid fa-triangle-exclamation"></i> <span x-text="rotulosCards.prazo"></span></span>
                                                            <span class="px-2 py-0.5 rounded-full font-bold" :class="corSituacao(obterPorcentagemPrazo(cidadeDetalhe.prazoInicio, cidadeDetalhe.prazoFim))" x-text="rotuloSituacao(obterPorcentagemPrazo(cidadeDetalhe.prazoInicio, cidadeDetalhe.prazoFim))"></span>
                                                        </div>
                                                        <div class="w-full bg-slate-800 rounded-full h-2 overflow-hidden border border-slate-700">
                                                            <div class="h-full rounded-full transition-all duration-500"
                                                                 :style="'width: ' + obterPorcentagemPrazo(cidadeDetalhe.prazoInicio, cidadeDetalhe.prazoFim) + '%'"
                                                                 :class="obterCorBarraProgresso(obterPorcentagemPrazo(cidadeDetalhe.prazoInicio, cidadeDetalhe.prazoFim))">
                                                            </div>
                                                        </div>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>

                                        <!-- REGRA DE HORAS -->
                                        <template x-if="campo === 'regraHoras'">
                                            <div class="flex flex-col gap-1.5 bg-slate-950 p-2.5 rounded-xl border border-slate-800">
                                                <span class="text-slate-500 text-[11px] font-bold uppercase tracking-wider" x-text="rotulosCards.regraHoras + ':'"></span>
                                                <span class="font-bold text-slate-200 text-xs flex items-center gap-2">
                                                    <i class="fa-solid fa-gear text-blue-400 animate-spin-slow"></i>
                                                    <span class="text-blue-300" x-text="cidadeDetalhe.regraHoras || 'Modo Normal (Fluxo Livre)'"></span>
                                                </span>
                                            </div>
                                        </template>

                                        <!-- PLANTÃO FIM DE SEMANA -->
                                        <template x-if="campo === 'plantao'">
                                            <div class="flex flex-col gap-2 pt-1">
                                                <div class="flex items-center justify-between">
                                                    <span class="text-slate-500 text-xs" x-text="rotulosCards.tecnicosFimSemana + ':'"></span>
                                                    <template x-if="cidadeDetalhe.tecnicosFimSemana">
                                                        <span class="text-emerald-400 font-bold text-[11px] flex items-center gap-1 bg-emerald-500/10 px-2 py-0.5 rounded-md">
                                                            <i class="fa-solid fa-circle-check"></i> Ativo
                                                        </span>
                                                    </template>
                                                    <template x-if="!cidadeDetalhe.tecnicosFimSemana">
                                                        <span class="text-rose-400 font-bold text-[11px] flex items-center gap-1 bg-rose-500/10 px-2 py-0.5 rounded-md">
                                                            <i class="fa-solid fa-circle-xmark"></i> Inativo
                                                        </span>
                                                    </template>
                                                </div>

                                                <template x-if="cidadeDetalhe.tecnicosFimSemana">
                                                    <div class="bg-slate-950 p-2.5 rounded-xl border border-slate-800 space-y-2">
                                                        <div class="flex items-center justify-between text-xs">
                                                            <span class="text-slate-500" x-text="rotulosCards.plantonista + ':'"></span>

                                                            <template x-if="isFimDeSemana()">
                                                                <span>
                                                                    <template x-if="!cidadeDetalhe.plantonistaFDS && !cidadeDetalhe.modoAutoPlantonista">
                                                                        <span class="text-amber-400 font-extrabold uppercase tracking-wide bg-amber-500/10 border border-amber-500/20 px-2 py-0.5 rounded animate-pulse text-[10px]">
                                                                            <i class="fa-solid fa-triangle-exclamation mr-1"></i>Não Definido
                                                                        </span>
                                                                    </template>
                                                                    <template x-if="!cidadeDetalhe.plantonistaFDS && cidadeDetalhe.modoAutoPlantonista">
                                                                        <span class="text-emerald-400 font-bold text-xs flex items-center gap-1">
                                                                            <i class="fa-solid fa-robot animate-pulse"></i> <span x-text="rotulosCards.plantonistaAuto"></span>
                                                                        </span>
                                                                    </template>
                                                                    <template x-if="cidadeDetalhe.plantonistaFDS">
                                                                        <span class="font-bold text-emerald-300" x-text="cidadeDetalhe.plantonistaFDS"></span>
                                                                    </template>
                                                                </span>
                                                            </template>

                                                            <template x-if="!isFimDeSemana()">
                                                                <span>
                                                                    <template x-if="!cidadeDetalhe.plantonistaFDS && !cidadeDetalhe.modoAutoPlantonista">
                                                                        <span class="text-slate-500 italic">Não Definido (Escala FDS)</span>
                                                                    </template>
                                                                    <template x-if="!cidadeDetalhe.plantonistaFDS && cidadeDetalhe.modoAutoPlantonista">
                                                                        <span class="text-emerald-500/80 font-medium text-xs flex items-center gap-1">
                                                                            <i class="fa-solid fa-robot text-[10px]"></i> Definido pelo Sistema
                                                                        </span>
                                                                    </template>
                                                                    <template x-if="cidadeDetalhe.plantonistaFDS">
                                                                        <span class="font-semibold text-slate-300" x-text="cidadeDetalhe.plantonistaFDS"></span>
                                                                    </template>
                                                                </span>
                                                            </template>
                                                        </div>
                                                        <div class="flex items-center gap-1.5 text-[11px] text-slate-400 border-t border-slate-900 pt-1.5">
                                                            <i class="fa-solid fa-truck-medical text-slate-500"></i>
                                                            <span x-text="rotuloAbertura(cidadeDetalhe.tipoAberturaFimSemana)"></span>
                                                        </div>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>

                                        <!-- OBSERVAÇÃO -->
                                        <template x-if="campo === 'observacao'">
                                            <div x-show="cidadeDetalhe.observacao" class="bg-amber-500/10 border border-amber-500/20 rounded-xl p-3 text-xs text-amber-300">
                                                <i class="fa-solid fa-circle-info mr-1"></i>
                                                <span class="font-bold" x-text="rotulosCards.observacao + ': '"></span>
                                                <span x-text="cidadeDetalhe.observacao"></span>
                                            </div>
                                        </template>

                                        <!-- MENSAGEM AUTOMÁTICA (rodapé) -->
                                        <template x-if="campo === 'mensagemAutomatica'">
                                            <div>
                                                <template x-if="cidadeDetalhe.modoPrazo !== 'semData'">
                                                    <div class="flex items-center gap-2.5 text-xs text-amber-300 bg-amber-500/10 border border-amber-500/20 p-3 rounded-xl font-bold">
                                                        <i class="fa-regular fa-calendar-check text-amber-400"></i>
                                                        <span x-text="rotulosCards.mensagemAutoLimitado"></span>
                                                    </div>
                                                </template>
                                                <template x-if="cidadeDetalhe.modoPrazo === 'semData'">
                                                    <div class="flex items-start gap-2.5 text-xs text-emerald-300 bg-emerald-500/10 border border-emerald-500/20 p-3 rounded-xl">
                                                        <i class="fa-solid fa-infinity text-emerald-400 mt-0.5"></i>
                                                        <div class="flex flex-col gap-0.5">
                                                            <span class="font-bold" x-text="rotulosCards.mensagemAutoLiberadoTitulo"></span>
                                                            <span class="text-emerald-400/80 font-medium" x-text="rotulosCards.mensagemAutoLiberadoDetalhe"></span>
                                                        </div>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
