                            <div class="bg-slate-900 rounded-2xl border border-slate-800 flex flex-col h-[70vh] max-h-[560px] overflow-hidden shadow-lg relative">
                                <div class="px-5 py-4 border-b border-slate-800 flex items-center justify-between gap-2.5 bg-gradient-to-r from-indigo-600/10 to-transparent">
                                    <div class="flex items-center gap-2.5 min-w-0">
                                        <button x-show="chatConversaCom || chatGrupoAtual" @click="voltarParaChatGeral" class="p-2 -ml-1 text-slate-400 hover:text-slate-100 rounded-lg hover:bg-slate-800 transition-fast shrink-0" title="Voltar ao chat geral">
                                            <i class="fa-solid fa-arrow-left"></i>
                                        </button>

                                        <template x-if="chatGrupoAtual">
                                            <span class="w-9 h-9 rounded-xl flex items-center justify-center shrink-0" :class="corBadgeGrupo(chatGrupoAtual.cor)">
                                                <i class="fa-solid" :class="chatGrupoAtual.icone"></i>
                                            </span>
                                        </template>
                                        <template x-if="!chatGrupoAtual">
                                            <span class="w-9 h-9 rounded-xl bg-indigo-500/15 text-indigo-400 flex items-center justify-center shrink-0 overflow-hidden">
                                                <img x-show="chatConversaCom && chatConversaCom.fotoUrl" :src="chatConversaCom ? chatConversaCom.fotoUrl : ''" class="w-full h-full object-cover" />
                                                <i x-show="!chatConversaCom" class="fa-solid fa-comments"></i>
                                                <span x-show="chatConversaCom && !chatConversaCom.fotoUrl" x-text="iniciaisUsuario(chatConversaCom)"></span>
                                            </span>
                                        </template>

                                        <div class="min-w-0">
                                            <h3 class="font-bold text-slate-100 text-sm truncate" x-text="chatGrupoAtual ? chatGrupoAtual.nome : (chatConversaCom ? chatConversaCom.nome : 'Chat Interno da Equipe')"></h3>
                                            <p class="text-[11px] text-slate-500 flex items-center gap-1.5 truncate">
                                                <span x-show="!chatGrupoAtual" class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse shrink-0"></span>
                                                <span x-text="chatGrupoAtual ? (chatGrupoAtual.totalMembros + ' membro' + (chatGrupoAtual.totalMembros === 1 ? '' : 's')) : (chatConversaCom ? 'Conversa privada' : 'Sincronizado em tempo real')" class="truncate"></span>
                                            </p>
                                        </div>
                                    </div>

                                    <div class="flex items-center gap-1 shrink-0">
                                        <button x-show="chatGrupoAtual && chatGrupoAtual.souAdminDoGrupo" @click="abrirGerenciarMembros(chatGrupoAtual)" class="p-2.5 text-slate-400 hover:text-indigo-400 hover:bg-indigo-500/10 rounded-xl transition-fast" title="Gerenciar membros">
                                            <i class="fa-solid fa-user-gear"></i>
                                        </button>
                                        <button x-show="chatGrupoAtual && !chatGrupoAtual.souAdminDoGrupo" @click="sairDoGrupo(chatGrupoAtual)" class="p-2.5 text-slate-400 hover:text-rose-400 hover:bg-rose-500/10 rounded-xl transition-fast" title="Sair do grupo">
                                            <i class="fa-solid fa-right-from-bracket"></i>
                                        </button>

                                        <div class="relative" @click.outside="mostrarListaUsuariosChat = false">
                                            <button
                                                x-show="!chatGrupoAtual && !chatConversaCom"
                                                @click.stop="carregarUsuariosChat(); carregarGrupos(); mostrarListaUsuariosChat = !mostrarListaUsuariosChat"
                                                class="pl-2.5 pr-3 py-2 text-slate-400 hover:text-indigo-400 hover:bg-indigo-500/10 rounded-xl transition-fast flex items-center gap-1.5"
                                                :class="mostrarListaUsuariosChat ? 'bg-indigo-500/10 text-indigo-400' : ''"
                                                title="Iniciar um grupo ou uma conversa privada"
                                                aria-haspopup="true"
                                                :aria-expanded="mostrarListaUsuariosChat"
                                            >
                                                <i class="fa-solid fa-circle-plus"></i>
                                                <span class="hidden sm:inline text-xs font-semibold">Nova conversa</span>
                                                <i class="fa-solid fa-chevron-down text-[9px] transition-transform" :class="mostrarListaUsuariosChat ? 'rotate-180' : ''"></i>
                                            </button>
                                            <div x-show="mostrarListaUsuariosChat"
                                                 x-transition class="absolute right-0 top-full mt-2 w-72 bg-slate-800 border border-slate-700 rounded-xl shadow-xl z-20 max-h-80 overflow-y-auto" style="display:none;">

                                                <!-- Texto simples explicando o que este menu faz, para quem não é
                                                     familiarizado com o sistema: clicar aqui NÃO envia nada — só
                                                     abre um grupo existente, cria um novo, ou inicia uma conversa
                                                     individual com outra pessoa. -->
                                                <p class="text-[11px] text-slate-500 px-3 pt-3 pb-1 leading-snug">
                                                    Escolha um grupo para entrar ou uma pessoa para conversar em particular.
                                                </p>

                                                <div class="flex items-center justify-between px-3 pt-2 pb-1">
                                                    <p class="text-[11px] font-bold uppercase tracking-wide text-slate-500">Grupos</p>
                                                    <button @click="abrirModalNovoGrupo(); mostrarListaUsuariosChat = false" class="text-[11px] font-bold text-indigo-400 hover:text-indigo-300 flex items-center gap-1">
                                                        <i class="fa-solid fa-plus text-[9px]"></i> Criar novo grupo
                                                    </button>
                                                </div>
                                                <template x-for="g in chatGrupos" :key="'grp-' + g.id">
                                                    <button @click="entrarNoGrupo(g); mostrarListaUsuariosChat = false" class="w-full flex items-center gap-2.5 px-3 py-2 hover:bg-slate-700/60 transition-fast text-left">
                                                        <div class="w-7 h-7 rounded-lg flex items-center justify-center shrink-0" :class="corBadgeGrupo(g.cor)">
                                                            <i class="fa-solid text-xs" :class="g.icone"></i>
                                                        </div>
                                                        <span class="text-sm text-slate-200 truncate flex-1" x-text="g.nome"></span>
                                                        <span class="text-[10px] text-slate-500 shrink-0" x-text="g.totalMembros"></span>
                                                    </button>
                                                </template>
                                                <p x-show="chatGrupos.length === 0" class="text-xs text-slate-500 text-center py-3">Nenhum grupo ainda.</p>

                                                <div class="border-t border-slate-700 mt-1"></div>
                                                <p class="text-[11px] font-bold uppercase tracking-wide text-slate-500 px-3 pt-3 pb-1">Conversa privada (só você e a pessoa)</p>
                                                <template x-for="u in chatUsuarios" :key="u.id">
                                                    <button @click="iniciarConversaPrivada(u); mostrarListaUsuariosChat = false" class="w-full flex items-center gap-2.5 px-3 py-2 hover:bg-slate-700/60 transition-fast text-left">
                                                        <div class="w-7 h-7 rounded-lg overflow-hidden bg-slate-700 flex items-center justify-center text-[10px] font-bold text-slate-300 shrink-0">
                                                            <img x-show="u.fotoUrl" :src="u.fotoUrl" class="w-full h-full object-cover" />
                                                            <span x-show="!u.fotoUrl" x-text="iniciaisUsuario(u)"></span>
                                                        </div>
                                                        <span class="text-sm text-slate-200 truncate" x-text="u.nome"></span>
                                                        <span x-show="u.role === 'admin'" class="ml-auto text-[9px] font-bold uppercase text-indigo-400 bg-indigo-500/10 px-1.5 py-0.5 rounded-full shrink-0">Admin</span>
                                                    </button>
                                                </template>
                                                <p x-show="chatUsuarios.length === 0" class="text-xs text-slate-500 text-center py-3">Nenhum outro usuário aprovado ainda.</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="flex-grow overflow-y-auto p-5 space-y-4" x-ref="chatScroll">
                                    <template x-for="msg in chatMensagens" :key="msg.id">
                                        <div
                                            class="flex gap-2.5 max-w-[88%] chat-msg-in"
                                            :class="msg.autorId === usuarioAtual.id ? 'ml-auto flex-row-reverse' : ''"
                                        >
                                            <button
                                                @click.stop="abrirPerfilRapido(msg.autorId, msg.autor, msg.autorFotoUrl, msg.autorEhAdmin)"
                                                class="w-8 h-8 rounded-xl overflow-hidden bg-slate-800 border border-slate-700 flex items-center justify-center text-[10px] font-bold text-slate-400 shrink-0 mt-0.5 hover:ring-2 hover:ring-indigo-500 transition-fast"
                                                title="Ver perfil"
                                            >
                                                <img x-show="msg.autorFotoUrl" :src="msg.autorFotoUrl" class="w-full h-full object-cover" />
                                                <span x-show="!msg.autorFotoUrl" x-text="(msg.autor || '?').trim().slice(0,2).toUpperCase()"></span>
                                            </button>

                                            <div class="flex flex-col gap-1 min-w-0" :class="msg.autorId === usuarioAtual.id ? 'items-end' : 'items-start'">
                                                <div class="flex items-center gap-1.5 text-[11px] text-slate-500"
                                                     :class="msg.autorId === usuarioAtual.id ? 'flex-row-reverse' : ''">
                                                    <button @click.stop="abrirPerfilRapido(msg.autorId, msg.autor, msg.autorFotoUrl, msg.autorEhAdmin)" class="font-bold text-slate-400 hover:text-indigo-400 transition-fast" x-text="msg.autor"></button>
                                                    <span x-show="msg.autorEhAdmin" class="px-1.5 py-0.5 rounded-full bg-indigo-500/10 text-indigo-400 text-[9px] font-bold uppercase">Admin</span>
                                                    <span x-text="new Date(msg.criadoEm).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})"></span>
                                                    <span x-show="msg.editado" class="italic">(editado)</span>
                                                </div>

                                                <template x-if="mensagemEditandoId !== msg.id && mensagemApagandoId !== msg.id">
                                                    <div class="rounded-2xl px-4 py-2.5 text-sm break-words shadow-sm"
                                                         :class="msg.autorId === usuarioAtual.id ? 'bg-indigo-600 text-white rounded-tr-sm' : 'bg-slate-800 text-slate-200 rounded-tl-sm'"
                                                         x-html="linkify(msg.conteudo)">
                                                    </div>
                                                </template>

                                                <template x-if="mensagemEditandoId === msg.id">
                                                    <div class="w-full flex gap-2">
                                                        <input
                                                            type="text"
                                                            x-model="mensagemEditandoTexto"
                                                            @keydown.enter="salvarEdicaoMensagem()"
                                                            @keydown.escape="cancelarEdicaoMensagem()"
                                                            class="flex-grow bg-slate-800 border border-indigo-500 rounded-xl px-3 py-2 text-sm text-slate-100 focus:outline-none"
                                                        />
                                                        <button @click="salvarEdicaoMensagem()" class="text-emerald-400 hover:text-emerald-300 px-2"><i class="fa-solid fa-check"></i></button>
                                                        <button @click="cancelarEdicaoMensagem()" class="text-slate-500 hover:text-slate-300 px-2"><i class="fa-solid fa-xmark"></i></button>
                                                    </div>
                                                </template>

                                                <!-- Confirmacao de exclusao: pequeno pop-up inline, dentro do
                                                     proprio balao da mensagem (mesmo espirito do modo de edicao
                                                     acima) - nunca um modal de tela cheia. Isso mantem o chat
                                                     aberto e no contexto da conversa o tempo todo. -->
                                                <template x-if="mensagemApagandoId === msg.id">
                                                    <div class="w-full rounded-2xl px-4 py-3 text-sm bg-rose-950/40 border border-rose-500/30">
                                                        <p class="text-rose-200 mb-2.5 flex items-center gap-2">
                                                            <i class="fa-solid fa-triangle-exclamation text-rose-400"></i>
                                                            Apagar esta mensagem?
                                                        </p>
                                                        <div class="flex items-center gap-2 justify-end">
                                                            <button
                                                                type="button"
                                                                @click="cancelarApagarMensagem()"
                                                                :disabled="apagandoMensagem"
                                                                class="bg-slate-800 hover:bg-slate-700 disabled:opacity-40 text-slate-300 font-semibold px-3 py-1.5 rounded-lg text-xs transition-fast"
                                                            >Cancelar</button>
                                                            <button
                                                                type="button"
                                                                @click="confirmarApagarMensagem(msg)"
                                                                :disabled="apagandoMensagem"
                                                                class="bg-rose-600 hover:bg-rose-500 disabled:opacity-60 text-white font-semibold px-3 py-1.5 rounded-lg text-xs transition-fast flex items-center gap-1.5"
                                                            >
                                                                <i x-show="apagandoMensagem" class="fa-solid fa-circle-notch fa-spin"></i>
                                                                <span x-text="apagandoMensagem ? 'Apagando...' : 'Apagar'"></span>
                                                            </button>
                                                        </div>
                                                    </div>
                                                </template>

                                                <div class="flex items-center gap-3 text-[11px]" x-show="mensagemEditandoId !== msg.id && mensagemApagandoId !== msg.id">
                                                    <button x-show="msg.podeEditar" @click="iniciarEdicaoMensagem(msg)" class="text-slate-500 hover:text-indigo-400 transition-fast">
                                                        <i class="fa-solid fa-pen"></i> Editar
                                                    </button>
                                                    <button x-show="msg.podeApagar" @click="apagarMensagem(msg)" class="text-slate-500 hover:text-rose-400 transition-fast">
                                                        <i class="fa-solid fa-trash"></i> Apagar
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </template>

                                    <div x-show="chatMensagens.length === 0" class="text-center text-slate-500 py-12">
                                        <i class="fa-regular fa-comment-dots text-3xl mb-2 block mx-auto text-slate-700 anim-bounce-soft"></i>
                                        <span x-show="!chatConversaCom">Nenhuma mensagem ainda. Seja o primeiro a escrever!</span>
                                        <span x-show="chatConversaCom">Nenhuma mensagem ainda com <span x-text="chatConversaCom ? chatConversaCom.nome : ''"></span>. Diga oi!</span>
                                    </div>
                                </div>

                                <form @submit.prevent="enviarMensagemChat" class="p-4 border-t border-slate-800 flex gap-3">
                                    <input
                                        type="text"
                                        x-model="novaMensagemChat"
                                        maxlength="2000"
                                        :placeholder="chatConversaCom ? ('Mensagem privada para ' + chatConversaCom.nome + '...') : 'Escreva uma mensagem... (links são detectados automaticamente)'"
                                        class="flex-grow bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                    />
                                    <button
                                        type="submit"
                                        :disabled="!novaMensagemChat.trim()"
                                        class="bg-indigo-600 hover:bg-indigo-500 disabled:opacity-40 disabled:cursor-not-allowed text-white font-semibold px-5 py-2.5 rounded-xl transition-fast flex items-center gap-2"
                                    >
                                        <i class="fa-solid fa-paper-plane"></i>
                                        <span class="hidden sm:inline">Enviar</span>
                                    </button>
                                </form>

                                <!-- POPOVER: PERFIL RÁPIDO -->
                                <div x-show="perfilRapido" @click.outside="fecharPerfilRapido" x-transition
                                     class="absolute inset-0 bg-slate-950/60 flex items-center justify-center z-30" style="display:none;">
                                    <div class="bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl w-64 p-5 text-center relative">
                                        <button @click="fecharPerfilRapido" class="absolute top-3 right-3 text-slate-500 hover:text-slate-300"><i class="fa-solid fa-xmark"></i></button>
                                        <template x-if="perfilRapido">
                                            <div>
                                                <div class="w-16 h-16 rounded-2xl overflow-hidden bg-slate-800 border border-slate-700 flex items-center justify-center text-lg font-bold text-slate-400 mx-auto mb-3">
                                                    <img x-show="perfilRapido.fotoUrl" :src="perfilRapido.fotoUrl" class="w-full h-full object-cover" />
                                                    <span x-show="!perfilRapido.fotoUrl" x-text="iniciaisUsuario(perfilRapido)"></span>
                                                </div>
                                                <p class="font-bold text-slate-100" x-text="perfilRapido.nome"></p>
                                                <p class="text-[11px] text-slate-500 mb-4" x-text="perfilRapido.ehAdmin ? 'Administrador' : 'Usuário'"></p>
                                                <button @click="iniciarConversaPrivada(perfilRapido)" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold px-4 py-2.5 rounded-xl transition-fast flex items-center justify-center gap-2 text-sm">
                                                    <i class="fa-solid fa-comment-dots"></i> Mensagem Privada
                                                </button>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </div>
