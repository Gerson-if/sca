                <!-- Botão flutuante + painel do chat ficam no mesmo contêiner:
                     assim, clicar fora do conjunto fecha o chat, e clicar no
                     próprio botão (mesmo estando "fora" do painel) nunca é
                     tratado como clique externo — sem essa junção, o clique
                     que reabre o chat corria contra o clique que acabou de
                     fechá-lo e o painel parecia "não voltar".

                     Importante: este wrapper NÃO pode usar `display: contents`
                     (a classe `contents` do Tailwind). O Alpine ignora
                     silenciosamente o @click.outside quando o elemento ao
                     qual ele está preso tem offsetWidth/offsetHeight zerados
                     — exatamente o que `display: contents` sempre produz,
                     pois o elemento deixa de gerar caixa própria. Era por
                     isso que clicar fora nunca fechava o chat. Como o botão
                     e o painel já são `fixed` (fora do fluxo normal), um
                     wrapper comum (bloco) não afeta o layout deles. -->
                <div @click.outside="chatFlutuanteAberto = false">
                    <button
                        @click="alternarChatFlutuante"
                        class="fixed bottom-6 right-6 z-40 w-14 h-14 rounded-full bg-indigo-600 hover:bg-indigo-500 text-white shadow-2xl shadow-indigo-900/40 flex items-center justify-center transition-fast hover:scale-105"
                        :class="chatNaoLidas > 0 && !chatFlutuanteAberto ? 'anim-bounce-soft' : ''"
                        title="Chat da equipe"
                    >
                        <i class="fa-solid text-xl" :class="chatFlutuanteAberto ? 'fa-xmark' : 'fa-comments'"></i>
                        <span
                            x-show="chatNaoLidas > 0 && !chatFlutuanteAberto"
                            x-text="chatNaoLidas > 9 ? '9+' : chatNaoLidas"
                            class="absolute -top-1 -right-1 bg-rose-500 border-2 border-slate-950 text-white text-[10px] font-bold rounded-full min-w-[20px] h-5 flex items-center justify-center px-1 animate-pulse"
                        ></span>
                    </button>

                    <div
                        x-show="chatFlutuanteAberto"
                        x-transition:enter="transition ease-out duration-200"
                        x-transition:enter-start="opacity-0 translate-y-4 scale-95"
                        x-transition:enter-end="opacity-100 translate-y-0 scale-100"
                        x-transition:leave="transition ease-in duration-150"
                        x-transition:leave-start="opacity-100 translate-y-0 scale-100"
                        x-transition:leave-end="opacity-0 translate-y-4 scale-95"
                        class="fixed bottom-24 right-6 z-40 w-[calc(100vw-3rem)] max-w-sm sm:w-96"
                        style="display:none;"
                    >
                        {% include "partials/_chat.html" %}
                    </div>
                </div>
