        <template x-if="page === 'landing'">
            <div class="relative min-h-screen w-full overflow-hidden bg-slate-950 flex flex-col">

                <!-- ===== FUNDO (imagem, vídeo ou gradiente padrão) ===== -->
                <div class="absolute inset-0 z-0">
                    <video
                        x-show="configuracaoSite.tipoFundo === 'video' && configuracaoSite.videoFundoUrl"
                        :src="configuracaoSite.videoFundoUrl"
                        autoplay muted loop playsinline
                        class="w-full h-full object-cover"
                    ></video>
                    <img
                        x-show="configuracaoSite.tipoFundo === 'imagem' && configuracaoSite.imagemFundoUrl"
                        :src="configuracaoSite.imagemFundoUrl"
                        class="w-full h-full object-cover"
                    />
                    <div
                        x-show="configuracaoSite.tipoFundo === 'nenhum' || (configuracaoSite.tipoFundo === 'imagem' && !configuracaoSite.imagemFundoUrl) || (configuracaoSite.tipoFundo === 'video' && !configuracaoSite.videoFundoUrl)"
                        class="w-full h-full bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950"
                    ></div>
                    <div class="absolute inset-0 bg-slate-950/75"></div>
                    <div class="absolute inset-0 opacity-40" style="background-image: radial-gradient(circle at 20% 20%, rgba(99,102,241,0.20), transparent 45%), radial-gradient(circle at 80% 85%, rgba(59,130,246,0.15), transparent 45%);"></div>
                </div>

                <!-- ===== CONTEÚDO ===== -->
                <div class="relative z-10 flex-grow flex flex-col items-center justify-center text-center px-4 py-20 fade-in">
                    <img
                        x-show="configuracaoSite.logoUrl"
                        :src="configuracaoSite.logoUrl"
                        class="w-20 h-20 rounded-2xl object-cover mb-6 shadow-xl border border-white/10"
                    />
                    <div
                        x-show="!configuracaoSite.logoUrl"
                        class="w-20 h-20 rounded-2xl flex items-center justify-center text-white text-3xl mb-6 shadow-xl"
                        :style="'background: ' + configuracaoSite.corDestaque"
                    >
                        <i class="fa-solid fa-city"></i>
                    </div>

                    <h1 class="text-4xl sm:text-5xl md:text-6xl font-extrabold text-white tracking-tight max-w-3xl" x-text="configuracaoSite.nomeEmpresa"></h1>
                    <p class="text-lg sm:text-xl text-slate-300 mt-4 max-w-xl font-medium" x-text="configuracaoSite.slogan"></p>
                    <p x-show="configuracaoSite.descricao" class="text-sm sm:text-base text-slate-400 mt-5 max-w-2xl leading-relaxed" x-text="configuracaoSite.descricao"></p>

                    <div class="flex flex-col sm:flex-row items-center gap-4 mt-10">
                        <button
                            @click="goLogin"
                            class="px-8 py-3.5 rounded-2xl font-bold text-white shadow-lg transition-fast hover:-translate-y-0.5 flex items-center gap-2"
                            :style="'background: ' + configuracaoSite.corDestaque"
                        >
                            Acessar Sistema <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </div>
                </div>

                <div class="relative z-10 text-center text-slate-500 text-xs pb-6 px-4">
                    &copy; <span x-text="new Date().getFullYear()"></span> <span x-text="configuracaoSite.nomeEmpresa"></span>. Todos os direitos reservados.
                </div>
            </div>
        </template>
