# /etc/nginx/sites-available/sca.conf
# Proxy reverso Nginx -> Gunicorn (SCA - Sistema de Cidades e Avisos)

upstream sca_app {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name seu-dominio.com.br;

    # Redireciona tudo para HTTPS (ajuste depois de configurar o certificado, ex.: Certbot)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name seu-dominio.com.br;

    ssl_certificate     /etc/letsencrypt/live/seu-dominio.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seu-dominio.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 26M;  # levemente acima do MAX_CONTENT_LENGTH da app (upload de imagem/vídeo)

    access_log /var/log/nginx/sca_access.log;
    error_log  /var/log/nginx/sca_error.log;

    # IMPORTANTE: não adicione "proxy_cache" a este bloco. A aplicação já
    # controla seu próprio cache via Cache-Control (respostas autenticadas
    # nunca podem ser cacheadas — ver README, seção "Segurança já incluída").
    # Um proxy_cache aqui que ignore esse header reintroduziria risco de
    # vazamento de sessão entre usuários diferentes.

    # Arquivos estáticos servidos diretamente pelo Nginx (mais rápido que via Flask)
    location /static/ {
        alias /var/www/sca_backend/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://sca_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 60s;
    }
}
